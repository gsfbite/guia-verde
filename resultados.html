        // ─── Normalização ────────────────────────────────────────────────────────
        function normalizar(texto) {
            return texto
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9\s]/g, " ")
                .trim();
        }

        // ─── Algoritmo de busca com pontuação ────────────────────────────────────
        function buscar(query) {
            const qNorm = normalizar(query);
            const tokens = qNorm.split(/\s+/).filter(t => t.length > 2);

            if (tokens.length === 0) return [];

            const resultados = [];

            for (const item of CATALOGO) {
                const tituloNorm = normalizar(item.titulo);
                const keywordsNorm = item.keywords.map(normalizar);
                const allTerms = [tituloNorm, ...keywordsNorm];

                let pontos = 0;
                const matched = new Set();

                for (const token of tokens) {
                    for (const kw of allTerms) {
                        if (kw === token) { pontos += 3; matched.add(kw); break; }
                        else if (kw.startsWith(token) || token.startsWith(kw)) { pontos += 2; matched.add(kw); break; }
                        else if (kw.includes(token) || token.includes(kw)) { pontos += 1; matched.add(kw); break; }
                    }
                }

                if (pontos > 0) {
                    resultados.push({ ...item, pontos, matched: [...matched] });
                }
            }

            resultados.sort((a, b) => b.pontos - a.pontos);
            return resultados;
        }

        // ─── Renderização dos cards ──────────────────────────────────────────────
        function renderCard(item, maxPontos) {
            const pct = Math.min(100, Math.round((item.pontos / maxPontos) * 100));
            const catLabel = item.categoria === "cultura" ? "Cultura" : "Guia";
            const catBg = item.categoria === "cultura" ? "bg-success" : "bg-primary";

            const tagsHTML = item.keywords.slice(0, 6).map(kw => {
                const isMatch = item.matched.some(m => m.includes(normalizar(kw)) || normalizar(kw).includes(m));
                return `<span class="keyword-tag ${isMatch ? 'matched' : ''}">${kw}</span>`;
            }).join("");

            return `
            <div class="col-sm-6 col-lg-4">
                <div class="result-card card">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex align-items-start justify-content-between mb-2">
                            <span class="category-badge ${catBg} text-white">${catLabel}</span>
                            <i class="bi ${item.icone} text-${item.cor}" style="font-size:1.4rem;"></i>
                        </div>
                        <h5 class="card-title">${item.titulo}</h5>
                        <p class="card-text flex-grow-1">${item.descricao}</p>
                        <div class="keyword-tags mb-3">${tagsHTML}</div>
                        <div class="score-bar">
                            <div class="score-fill" style="width:${pct}%"></div>
                        </div>
                        <a href="${item.link}" class="btn btn-acessar mt-3 w-100">
                            <i class="bi bi-arrow-right-circle"></i> Acessar
                        </a>
                    </div>
                </div>
            </div>`;
        }

        // ─── Execução principal ──────────────────────────────────────────────────
        function executarBusca(query) {
            const header = document.getElementById("resultsHeader");
            const semRes = document.getElementById("semResultados");
            const secCulturas = document.getElementById("secaoCulturas");
            const secGuias = document.getElementById("secaoGuias");
            const gridCulturas = document.getElementById("gridCulturas");
            const gridGuias = document.getElementById("gridGuias");

            semRes.style.display = "none";
            secCulturas.style.display = "none";
            secGuias.style.display = "none";
            gridCulturas.innerHTML = "";
            gridGuias.innerHTML = "";

            if (!query || query.trim().length < 2) {
                header.innerHTML = `
                    <h2><i class="bi bi-search me-2"></i>Digite algo para buscar</h2>
                    <p>Use a barra de busca acima para encontrar culturas ou guias.</p>`;
                semRes.style.display = "block";
                document.getElementById("semResultadosTexto").textContent = "Informe um termo de busca.";
                return;
            }

            const resultados = buscar(query);
            const culturas = resultados.filter(r => r.categoria === "cultura");
            const guias = resultados.filter(r => r.categoria === "guia");
            const maxPontos = resultados.length > 0 ? resultados[0].pontos : 1;

            // Header
            header.innerHTML = `
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div>
                        <h2><i class="bi bi-search me-2"></i>Resultados para <span class="query-badge">${query}</span></h2>
                        <p>${resultados.length} ${resultados.length === 1 ? 'resultado encontrado' : 'resultados encontrados'} no catálogo.</p>
                    </div>
                </div>`;

            if (resultados.length === 0) {
                semRes.style.display = "block";
                
                // Usamos innerHTML para que o navegador interprete a tag <a>
                document.getElementById("semResultadosTexto").innerHTML = 
                    `Não encontramos nada relacionado a "<strong>${query}</strong>". ` +
                    `Tente termos como "praga", "tomate", "nutrição" ou "clima". ` +
                    `Ou ainda, confira a <a href="src/pages/culturas/principal.html">lista completa de culturas</a>`;
                
                return;
            }

            if (culturas.length > 0) {
                secCulturas.style.display = "block";
                gridCulturas.innerHTML = culturas.map(r => renderCard(r, maxPontos)).join("");
            }

            if (guias.length > 0) {
                secGuias.style.display = "block";
                gridGuias.innerHTML = guias.map(r => renderCard(r, maxPontos)).join("");
            }
        }

        // ─── Lê query da URL ─────────────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const queryURL = params.get("q") || "";

        if (queryURL) {
            document.getElementById("searchRefinement").value = queryURL;
            document.getElementById("searchNav").value = queryURL;
        }

        executarBusca(queryURL);

        // ─── Botão de refinamento ────────────────────────────────────────────────
        document.getElementById("btnRefinement").addEventListener("click", function () {
            const novaQuery = document.getElementById("searchRefinement").value.trim();
            if (novaQuery) {
                window.location.href = "resultados.html?q=" + encodeURIComponent(novaQuery);
            }
        });

        document.getElementById("searchRefinement").addEventListener("keydown", function (e) {
            if (e.key === "Enter") document.getElementById("btnRefinement").click();
        });

        // ─── Navbar search (autocomplete + redirect) ─────────────────────────────
        const searchNav = document.getElementById("searchNav");
        const suggestionsNav = document.getElementById("suggestions-results");

        searchNav.addEventListener("input", function () {
            const val = searchNav.value.trim();
            suggestionsNav.innerHTML = "";
            if (val.length < 2) { suggestionsNav.style.display = "none"; return; }

            const res = buscar(val).slice(0, 6);
            res.forEach(item => {
                const div = document.createElement("div");
                div.innerHTML = `<i class="bi ${item.icone} me-2 text-${item.cor}"></i>${item.titulo}`;
                div.onclick = () => { window.location.href = item.link; };
                suggestionsNav.appendChild(div);
            });

            suggestionsNav.style.display = res.length > 0 ? "block" : "none";
        });

        document.getElementById("navSearchForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const val = searchNav.value.trim();
            if (val) window.location.href = "resultados.html?q=" + encodeURIComponent(val);
        });

        document.addEventListener("click", function (e) {
            if (!searchNav.contains(e.target) && !suggestionsNav.contains(e.target)) {
                suggestionsNav.style.display = "none";
            }
        });
    </script>
</body>
</html>
